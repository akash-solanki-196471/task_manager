# Reference Nginx config for EC2 — copy to /etc/nginx/sites-available/task-manager
# then: sudo ln -s /etc/nginx/sites-available/task-manager /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
#
# NOTE: CloudFront forwards /api/* to this EC2 on port 80.
#       Direct browser traffic only hits CloudFront (HTTPS), never this server directly
#       (Security Group should only open port 80 to the CloudFront managed prefix list).

server {
    listen 80;
    server_name _;  # Accept any hostname — CloudFront uses the EC2 Elastic IP internally

    # Increase timeouts for long-running requests
    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # All API traffic (including /api/health)
    location /api/ {
        proxy_pass         http://localhost:5001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        '';
    }

    # Block any non-API traffic that somehow reaches EC2 directly
    location / {
        return 404 '{"error":"Not found"}';
        add_header Content-Type application/json;
    }
}
