name: Deploy to AWS

on:
  push:
    branches:
      - aws-deployment

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Build Angular SPA → S3 → CloudFront invalidation
  # ─────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Frontend → S3 + CloudFront
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build (production)
        working-directory: frontend
        run: npx ng build --configuration production

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      # Sync hashed assets with long-lived cache, index.html with no-cache
      - name: Sync to S3 (hashed assets)
        run: |
          aws s3 sync frontend/dist/task-manager-frontend/browser/ \
            s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync to S3 (index.html — no cache)
        run: |
          aws s3 cp frontend/dist/task-manager-frontend/browser/index.html \
            s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  # ─────────────────────────────────────────────────────────────
  # Job 2: SSH into EC2, pull code, restart backend via PM2
  # ─────────────────────────────────────────────────────────────
  deploy-backend:
    name: Backend → EC2 (PM2)
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.EC2_HOST }}
          username:    ubuntu
          key:         ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          timeout:     120s
          script: |
            set -e
            cd /opt/task-manager

            echo "── Pulling latest code ──"
            git pull origin aws-deployment

            echo "── Installing production dependencies ──"
            cd backend
            npm ci --omit=dev

            echo "── Fetching secrets from SSM ──"
            MONGODB_URI=$(aws ssm get-parameter \
              --name /taskmanager/MONGODB_URI \
              --with-decryption \
              --query Parameter.Value \
              --output text)
            JWT_SECRET=$(aws ssm get-parameter \
              --name /taskmanager/JWT_SECRET \
              --with-decryption \
              --query Parameter.Value \
              --output text)
            ALLOWED_ORIGINS="${{ secrets.ALLOWED_ORIGINS }}"

            cat > .env <<EOF
            NODE_ENV=production
            PORT=5001
            MONGODB_URI=${MONGODB_URI}
            JWT_SECRET=${JWT_SECRET}
            ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
            EOF

            echo "── Reloading PM2 ──"
            pm2 reload ecosystem.config.js --env production

            echo "── Health check ──"
            sleep 3
            curl -f http://localhost:5001/api/health || \
              (echo "❌ Health check failed!" && pm2 logs task-manager-api --lines 30 && exit 1)

            echo "✅ Backend deployment complete"
