version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: task-manager-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: task-manager-api
    restart: unless-stopped
    ports:
      - '5001:5001'
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=development
      - PORT=5001
      - MONGODB_URI=mongodb://mongodb:27017/taskmanager
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      # Hot-reload in dev: mount source (override the image copy)
      - ./backend:/app
      - /app/node_modules  # prevent host node_modules from shadowing container's

  frontend:
    image: node:20-alpine
    container_name: task-manager-frontend
    working_dir: /app
    command: sh -c "npm ci && npx ng serve --host 0.0.0.0 --poll 500"
    ports:
      - '4200:4200'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    environment:
      - NODE_OPTIONS=--max-old-space-size=2048

volumes:
  mongo_data:
